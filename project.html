<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body{
    background: black;
    color: white;
}

/* NAVBAR SAME THEME */
.navbar{
    width: 100%;
    position: fixed;
    top: 0;
    display: flex;
    justify-content: center;
    background: transparent;
    padding: 20px 0;
    z-index: 100;
}

.navlist{
    display: flex;
    gap: 3rem;
}

.navlist li{
    list-style: none;
}

.navlist li a{
    text-decoration: none;
    text-transform: uppercase;
    color: white;
    position: relative;
}

.navlist li a::after{
    content: "";
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 100%;
    height: 2px;
    background: white;
    transform: scaleX(0);
    transform-origin: bottom right;
    transition: transform .4s;
}

.navlist li a:hover::after,
.navlist .active::after{
    transform: scaleX(1);
    transform-origin: bottom left;
}

/* PROJECTS SECTION */
.projects-section{
    padding: 8rem 6rem;
}

.heading{
    text-align: center;
    font-size: 3rem;
    color: #5db9ee;
    margin-bottom: 3rem;
}

.projects-container{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2.5rem;
}

/* PROJECT CARD */
.project-card{
    background: rgba(255,255,255,0.05);
    padding: 2rem;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 20px rgba(255,255,255,0.08);
    transition: transform .3s, box-shadow .3s;
}

.project-card:hover{
    transform: translateY(-7px);
    box-shadow: 0 0 30px rgba(255,255,255,0.12);
}

.project-card h2{
    color: #5db9ee;
    margin-bottom: 1rem;
    font-size: 1.4rem;
}

.project-card p{
    color: #ccc;
    font-size: 0.95rem;
    margin-bottom: 1.5rem;
    line-height: 1.6rem;
}

/* BUTTON */
.btn{
    display: inline-block;
    padding: 0.6rem 1.3rem;
    background: #5db9ee;
    color: black;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
    transition: .3s;
}

.btn:hover{
    background: white;
    color: black;
}
</style>
